name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager
      
      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit
      
  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up database
        env:
          RAILS_ENV: test
        run: bin/rails db:prepare

      - name: Get current week for cache key
        id: date
        run: echo "week=$(date +%Y-W%V)" >> $GITHUB_OUTPUT

      - name: Cache MTGJSON database
        uses: actions/cache@v4
        id: mtgjson-cache
        with:
          path: storage/mtgjson.sqlite3
          key: mtgjson-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}-weekly-${{ steps.date.outputs.week }}
          restore-keys: |
            mtgjson-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}-weekly-

      - name: Download MTGJSON database
        if: steps.mtgjson-cache.outputs.cache-hit != 'true'
        env:
          RAILS_ENV: test
        run: |
          echo "Downloading MTGJSON database..."
          bin/rails mtgjson:download

      - name: Verify MTGJSON database
        env:
          RAILS_ENV: test
        run: bin/rails mtgjson:verify

      - name: Set up MTGJSON test database
        env:
          RAILS_ENV: test
        run: bin/rails mtgjson:setup_test

      - name: Run unit tests
        env:
          RAILS_ENV: test
        run: bin/rspec --tag ~type:system --format progress

      - name: Install Chrome for system tests
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run system tests
        env:
          RAILS_ENV: test
        run: bin/rspec --tag type:system --format progress

